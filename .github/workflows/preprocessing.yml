name: Automated Preprocessing Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  preprocessing:
    name: Run Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn requests

      - name: Run automate_DamarPrayogaSetiawan.py
        run: |
          cd preprocessing
          python automate_DamarPrayogaSetiawan.py

      - name: Verify Output File
        run: |
          ls -lh preprocessing/titanic_preprocessing.csv
          python -c "
          import pandas as pd
          df = pd.read_csv('preprocessing/titanic_preprocessing.csv')
          print(f'Shape: {df.shape}')
          print(df.head(3).to_string())
          "

      - name: Commit Preprocessed Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/titanic_preprocessing.csv
          git diff --staged --quiet || git commit -m "chore: update titanic_preprocessing.csv [automated]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
