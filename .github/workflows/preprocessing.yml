name: Automated Preprocessing Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'preprocessing/automate_DamarPrayogaSetiawan.py'
      - 'preprocessing/titanic_raw.csv'
      - '.github/workflows/preprocessing.yml'
  workflow_dispatch:
    inputs:
      dataset_source:
        description: 'URL atau path dataset (kosongkan untuk default Titanic)'
        required: false
        default: 'https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv'

jobs:
  preprocessing:
    name: Run Data Preprocessing
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout Repository ──
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Python ──
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # ── 3. Install Dependencies ──
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy scikit-learn

      # ── 4. Run Preprocessing Script ──
      - name: Run automate_DamarPrayogaSetiawan.py
        run: |
          cd preprocessing
          python automate_DamarPrayogaSetiawan.py "${{ github.event.inputs.dataset_source || 'https://raw.githubusercontent.com/datasciencedojo/datasets/master/titanic.csv' }}"

      # ── 5. Verify Output ──
      - name: Verify Output File
        run: |
          echo "=== Verifikasi Output ==="
          ls -lh preprocessing/titanic_preprocessing.csv
          echo ""
          echo "=== 5 Baris Pertama ==="
          python -c "
          import pandas as pd
          df = pd.read_csv('preprocessing/titanic_preprocessing.csv')
          print(f'Shape: {df.shape}')
          print(df.head())
          "

      # ── 6. Commit & Push Hasil Preprocessing ──
      - name: Commit Preprocessed Dataset
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add preprocessing/titanic_preprocessing.csv
          git diff --staged --quiet || git commit -m "chore: update titanic_preprocessing.csv [automated]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
